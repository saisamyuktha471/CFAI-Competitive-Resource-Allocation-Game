name: Run Competitive Resource Allocation System

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run Script
        run: python CompetitiveGame.py